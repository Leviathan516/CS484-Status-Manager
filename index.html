<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Status Manager Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app-container">
      <div id="header">
        <div id="status-dot"></div>
        <h1 id="main-title">Status Manager</h1>
        <p id="subtitle">DOM Interaction Dashboard</p>
      </div>

      <div id="control-panel">
        <a id="toggle-button" href="#">
          <span class="btn-icon">◎</span>
          <span class="btn-label">Toggle Status</span>
        </a>
        <button id="timer-button">
          <span class="btn-icon">▶</span>
          <span class="btn-label">Start Timer</span>
        </button>
      </div>

      <div id="status-output" class="hidden">
        <div id="status-header">
          <span id="status-label">LIVE</span>
          <span id="status-title">System Status</span>
        </div>
        <p id="status-text">All systems operational. Monitoring active.</p>
        <div id="timestamp-list"></div>
      </div>

      <div id="list-section">
        <h2>Monitored Items</h2>
        <ul id="item-list">
          <li><span class="item-index">01</span> Core Service</li>
          <li><span class="item-index">02</span> Database Layer</li>
          <li><span class="item-index">03</span> API Gateway</li>
          <li><span class="item-index">04</span> Cache Server</li>
          <li><span class="item-index">05</span> Message Queue</li>
        </ul>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
